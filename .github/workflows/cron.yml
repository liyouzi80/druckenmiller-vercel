name: Daily conviction pipeline
on:
  schedule:
    - cron: "30 8 * * 1-5"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pipeline
        run: |
          curl -f -s "https://druckenmiller-vercel.vercel.app/api/generate?secret=${{ secrets.CRON_SECRET }}"
